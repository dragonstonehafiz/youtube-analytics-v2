name: Feature
description: Propose entirely new functionality
labels:
  - feature
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What do you want, and why?
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance criteria
      description: Add each verifiable completion condition as a Markdown checkbox.
      placeholder: |
        - [ ] First verifiable outcome
        - [ ] Second verifiable outcome
        - [ ] Relevant edge cases are handled
    validations:
      required: true

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
    validations:
      required: false
