name: Feature
description: Propose entirely new functionality
labels:
  - feature
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What do you want, and why?
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance criteria
      description: What must be true for this to be considered complete?
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
    validations:
      required: false
