name: CI

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Compile backend modules
        run: python -m compileall -q .

      - name: Import FastAPI application
        run: python -c "import server; assert server.app is not None"

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # npm ci fails with EUSAGE on this lockfile due to a known npm bug with
      # platform-specific optional dependencies (rollup/esbuild/oxlint native
      # binaries) resolving differently across OSes. Revert to `npm ci` once
      # npm fixes this.
      - name: Install frontend dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  gate:
    name: CI Gate
    needs: [backend, frontend]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check required jobs
        run: |
          if [ "${{ needs.backend.result }}" != "success" ] || [ "${{ needs.frontend.result }}" != "success" ]; then
            echo "::error::One or more required jobs did not succeed (backend: ${{ needs.backend.result }}, frontend: ${{ needs.frontend.result }})"
            exit 1
          fi
          echo "All required jobs passed."
