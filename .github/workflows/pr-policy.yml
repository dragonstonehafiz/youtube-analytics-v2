name: PR policy

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

permissions:
  contents: read
  pull-requests: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check branch naming
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          if ! [[ "$HEAD_REF" =~ ^(feature|bugfix|chore)/[a-z0-9]+(-[a-z0-9]+)*$ ]]; then
            echo "::error::Branch name '$HEAD_REF' must match feature/<kebab-case>, bugfix/<kebab-case>, or chore/<kebab-case>"
            exit 1
          fi
          echo "Branch name OK: $HEAD_REF"

      - name: Check PR title (Conventional Commits)
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          set -euo pipefail
          pattern='^(feat|fix|chore|docs|refactor|test|style|perf|build|ci)(\([a-z0-9./-]+\))?!?: .+'
          if ! [[ "$PR_TITLE" =~ $pattern ]]; then
            echo "::error::PR title '$PR_TITLE' must follow Conventional Commits, e.g. 'feat(scope): description'"
            exit 1
          fi
          echo "PR title OK: $PR_TITLE"

      - name: Check commit messages (Conventional Commits)
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          pattern='^(feat|fix|chore|docs|refactor|test|style|perf|build|ci)(\([a-z0-9./-]+\))?!?: .+'
          commits_json="$(gh api "repos/${REPO}/pulls/${PR_NUMBER}/commits" --paginate)"
          while IFS= read -r subject; do
            if ! [[ "$subject" =~ $pattern ]]; then
              echo "::error::Commit message '$subject' must follow Conventional Commits"
              exit 1
            fi
            echo "Commit OK: $subject"
          done < <(echo "$commits_json" | jq -r '.[].commit.message | split("\n")[0]')
