name: PR policy

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

permissions:
  contents: read

jobs:
  check:
    name: PR Policy
    runs-on: ubuntu-latest
    steps:
      - name: Check branch naming
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          if ! [[ "$HEAD_REF" =~ ^(feat|fix|chore)/[a-z0-9]+(-[a-z0-9]+)*$ ]]; then
            echo "::error::Branch name '$HEAD_REF' must match feat/<kebab-case>, fix/<kebab-case>, or chore/<kebab-case>"
            exit 1
          fi
          echo "Branch name OK: $HEAD_REF"

      - name: Check PR title (Conventional Commits)
        if: always()
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          set -euo pipefail
          echo "PR title: $PR_TITLE"
          pattern='^(feat|fix|chore)(\([a-z0-9./-]+\))?!?: .+'
          if ! [[ "$PR_TITLE" =~ $pattern ]]; then
            echo "::error title=Invalid PR title::$PR_TITLE"
            echo "❌ PR title failed: \`$PR_TITLE\`" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          echo "::notice title=PR title valid::$PR_TITLE"
          echo "✅ PR title passed: \`$PR_TITLE\`" >> "$GITHUB_STEP_SUMMARY"
